services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: saim
      POSTGRES_PASSWORD: saim
      POSTGRES_DB: saim_treasury
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saim"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO = émulation locale de Cloudflare R2 (API S3)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - miniodata:/data

  # Crée le bucket au démarrage
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      mc mb --ignore-existing local/saim-documents;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
